<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>IKTNAA — E-pasta paraksts</title>
</head>
<body style="margin:0;padding:0;background:#f5f5f5;font-family:Arial,Helvetica,sans-serif;">

<!-- Preview wrapper (remove in email client — copy only the signature table) -->
<div style="max-width:680px;margin:40px auto;background:#f5f5f5;padding:20px;">

<!-- ═══ SIGNATURE START ═══ -->
<table cellpadding="0" cellspacing="0" border="0" style="max-width:600px;border-collapse:collapse;font-family:Arial,Helvetica,sans-serif;">
  <tr>
    <td style="padding:0 0 12px 0;">
      <table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
        <tr>
          <!-- Logo -->
          <td style="vertical-align:middle;padding-right:16px;">
            <a href="https://itna.lv" target="_blank" style="text-decoration:none;">
              <img src="https://itna.lv/img/logo-email.jpg" alt="IKTNAA" width="64" height="64" style="display:block;border:0;border-radius:6px;" />
            </a>
          </td>
          <!-- Name + Title -->
          <td style="vertical-align:middle;">
            <p style="margin:0;font-size:18px;font-weight:700;color:#0F1B35;line-height:1.3;">Jorens Liopa</p>
            <p style="margin:2px 0 0 0;font-size:13px;color:#555;line-height:1.3;">Valdes loceklis</p>
          </td>
        </tr>
      </table>
    </td>
  </tr>

  <!-- Divider -->
  <tr>
    <td style="padding:0;">
      <table cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse:collapse;">
        <tr>
          <td style="height:2px;background:linear-gradient(90deg,#2557A7,#0F1B35);font-size:0;line-height:0;">&nbsp;</td>
        </tr>
      </table>
    </td>
  </tr>

  <!-- Contact details -->
  <tr>
    <td style="padding:12px 0 0 0;">
      <table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
        <tr>
          <!-- Phone -->
          <td style="vertical-align:middle;padding-right:6px;">
            <img src="https://cdn.jsdelivr.net/npm/lucide-static@0.263.1/icons/phone.svg" alt="" width="14" height="14" style="display:block;opacity:0.5;" />
          </td>
          <td style="vertical-align:middle;padding-right:20px;">
            <a href="tel:+37126187888" style="font-size:13px;color:#333;text-decoration:none;">+371 26187888</a>
          </td>
          <!-- Email -->
          <td style="vertical-align:middle;padding-right:6px;">
            <img src="https://cdn.jsdelivr.net/npm/lucide-static@0.263.1/icons/mail.svg" alt="" width="14" height="14" style="display:block;opacity:0.5;" />
          </td>
          <td style="vertical-align:middle;padding-right:20px;">
            <a href="mailto:info@itna.lv" style="font-size:13px;color:#2557A7;text-decoration:none;">info@itna.lv</a>
          </td>
          <!-- Website -->
          <td style="vertical-align:middle;padding-right:6px;">
            <img src="https://cdn.jsdelivr.net/npm/lucide-static@0.263.1/icons/globe.svg" alt="" width="14" height="14" style="display:block;opacity:0.5;" />
          </td>
          <td style="vertical-align:middle;">
            <a href="https://itna.lv" target="_blank" style="font-size:13px;color:#2557A7;text-decoration:none;font-weight:600;">itna.lv</a>
          </td>
        </tr>
      </table>
    </td>
  </tr>

  <!-- Association name -->
  <tr>
    <td style="padding:10px 0 0 0;">
      <p style="margin:0;font-size:11px;color:#888;letter-spacing:0.3px;">IKT nodarbināto atbalsta asociācija</p>
      <p style="margin:2px 0 0 0;font-size:10px;color:#aaa;font-style:italic;">Par stipru, godīgu un profesionālu IKT nozari.</p>
    </td>
  </tr>
</table>
<!-- ═══ SIGNATURE END ═══ -->

</div>
</body>
</html>
