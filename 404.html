<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — IKTNAA</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/img/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --dark: #0F1B35;
      --dark-2: #162244;
      --accent: #2557A7;
      --accent-hover: #1D4A8F;
      --white: #FFFFFF;
      --bg: #FAFBFD;
      --text: #1E293B;
      --text-secondary: #475569;
      --text-muted: #64748B;
      --border: #E2E6EF;
      --font: 'Inter', system-ui, -apple-system, sans-serif;
      --r: 12px;
      --r-sm: 8px;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font);
      background: var(--dark);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      position: relative;
    }

    /* Background orbs */
    body::before {
      content: '';
      position: absolute;
      top: -20%;
      right: -10%;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: rgba(37,87,167,0.1);
      filter: blur(100px);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: absolute;
      bottom: -15%;
      left: -10%;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: rgba(91,155,240,0.06);
      filter: blur(80px);
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      max-width: 560px;
    }

    .logo-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      margin-bottom: 3rem;
      opacity: 0.6;
      transition: opacity 0.3s;
    }

    .logo-link:hover { opacity: 1; }

    .logo-link img {
      height: 28px;
      width: auto;
      border-radius: 6px;
      background: white;
      padding: 2px;
    }

    .logo-link span {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--white);
    }

    .error-code {
      font-size: clamp(7rem, 20vw, 12rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.05em;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, rgba(37,87,167,0.4) 50%, rgba(91,155,240,0.2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1.5rem;
      animation: float 6s ease-in-out infinite;
      user-select: none;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: rgba(255,255,255,0.85);
      margin-bottom: 0.75rem;
      letter-spacing: -0.02em;
    }

    p {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.45);
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.875rem 1.75rem;
      border-radius: var(--r-sm);
      font-family: var(--font);
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s var(--ease);
      cursor: pointer;
      border: none;
      position: relative;
      overflow: hidden;
      background: var(--accent);
      color: var(--white);
    }

    .btn:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(37,87,167,0.3);
    }

    .btn::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -75%;
      width: 50%;
      height: 200%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transform: skewX(-20deg);
      animation: shimmer 4s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%, 100% { left: -75%; }
      50% { left: 125%; }
    }

    .btn svg {
      width: 16px;
      height: 16px;
      transition: transform 0.3s var(--ease);
    }

    .btn:hover svg { transform: translateX(-3px); }

    .lang-switch {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      display: flex;
      gap: 0.35rem;
      z-index: 10;
    }

    .lang-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      padding: 0.3rem 0.5rem;
      font-family: var(--font);
      font-size: 0.7rem;
      font-weight: 600;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      transition: all 0.2s;
    }

    .lang-btn.active {
      background: rgba(37,87,167,0.2);
      color: var(--white);
      border-color: rgba(37,87,167,0.35);
    }

    .lang-btn:hover:not(.active) { color: rgba(255,255,255,0.7); }

    /* Particles canvas */
    .bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .bg-canvas canvas { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div class="bg-canvas" id="bg-canvas"></div>

  <div class="lang-switch">
    <button class="lang-btn active" data-lang="lv">LV</button>
    <button class="lang-btn" data-lang="en">EN</button>
  </div>

  <div class="container">
    <a href="/" class="logo-link">
      <img src="/img/logo-white.jpg" alt="IKTNAA">
      <span>IKTNAA</span>
    </a>
    <div class="error-code">404</div>
    <h1 data-i18n="title">Lapa nav atrasta</h1>
    <p data-i18n="desc">Izskatās, ka šī lapa neeksistē vai ir pārvietota. Pārbaudiet adresi vai atgriezieties uz sākumlapu.</p>
    <a href="/" class="btn">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      <span data-i18n="btn">Uz sākumlapu</span>
    </a>
  </div>

  <script>
    const T = {
      lv: {
        title: 'Lapa nav atrasta',
        desc: 'Izskatās, ka šī lapa neeksistē vai ir pārvietota. Pārbaudiet adresi vai atgriezieties uz sākumlapu.',
        btn: 'Uz sākumlapu'
      },
      en: {
        title: 'Page not found',
        desc: 'It looks like this page doesn\'t exist or has been moved. Check the URL or return to the homepage.',
        btn: 'Back to homepage'
      }
    };

    let lang = localStorage.getItem('iktnaa-lang') || 'lv';

    function setLang(l) {
      lang = l;
      localStorage.setItem('iktnaa-lang', l);
      document.documentElement.lang = l;
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const val = T[l]?.[el.getAttribute('data-i18n')];
        if (val) el.textContent = val;
      });
      document.querySelectorAll('.lang-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.lang === l)
      );
    }

    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => setLang(btn.dataset.lang));
    });

    setLang(lang);

    // Particle background
    (function() {
      const container = document.getElementById('bg-canvas');
      const canvas = document.createElement('canvas');
      container.appendChild(canvas);
      const ctx = canvas.getContext('2d');
      let w, h, particles = [];

      function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
      }

      function init() {
        resize();
        particles = [];
        const count = Math.min(Math.floor(w * h / 20000), 40);
        for (let i = 0; i < count; i++) {
          particles.push({
            x: Math.random() * w,
            y: Math.random() * h,
            vx: (Math.random() - 0.5) * 0.2,
            vy: (Math.random() - 0.5) * 0.2,
            r: Math.random() * 1.2 + 0.5
          });
        }
      }

      function draw() {
        ctx.clearRect(0, 0, w, h);
        for (let i = 0; i < particles.length; i++) {
          const p = particles[i];
          p.x += p.vx; p.y += p.vy;
          if (p.x < 0 || p.x > w) p.vx *= -1;
          if (p.y < 0 || p.y > h) p.vy *= -1;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(37,87,167,0.3)';
          ctx.fill();
          for (let j = i + 1; j < particles.length; j++) {
            const p2 = particles[j];
            const d = Math.hypot(p.x - p2.x, p.y - p2.y);
            if (d < 120) {
              ctx.beginPath();
              ctx.moveTo(p.x, p.y);
              ctx.lineTo(p2.x, p2.y);
              ctx.strokeStyle = `rgba(37,87,167,${0.08 * (1 - d / 120)})`;
              ctx.lineWidth = 0.5;
              ctx.stroke();
            }
          }
        }
        requestAnimationFrame(draw);
      }

      window.addEventListener('resize', resize);
      init();
      draw();
    })();
  </script>
</body>
</html>
